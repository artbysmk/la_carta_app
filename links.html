<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>La Carta Links Oficiales</title>
  <link rel="icon" href="images/favicon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #db0000;
      font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 28px 20px;
    }

    .linktree-container {
      max-width: 460px;
      width: 100%;
      margin: 0 auto;
      background-color: transparent;
      padding: 12px 0 40px 0;
      transition: all 0.2s ease;
    }

    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 0;
    }

    .logo-png {
      max-width: 220px;
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 10px 24px rgba(0, 0, 0, 0.25));
      transition: transform 0.2s ease;
    }
    
    .logo-png:hover {
      transform: scale(1.02);
    }

    .links-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 38px;
    }

    .btn-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-radius: 50px;
      padding: 11px 16px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      transition: all 0.25s ease;
      cursor: pointer;
      box-shadow: 0 8px 16px -5px rgba(0, 0, 0, 0.2);
    }

    .btn-googleplay {
      background-color: white;
      border: none;
      color: #db0000;
    }

    .btn-googleplay:hover {
      background-color: #fff5f5;
      transform: translateY(-2px);
      box-shadow: 0 12px 20px -6px rgba(0, 0, 0, 0.25);
    }

    .btn-googleplay:active {
      transform: translateY(1px);
    }

    .btn-web {
      background-color: white;
      border: 2px solid rgba(255, 255, 255, 0.5);
      color: #db0000;
    }

    .btn-web:hover {
      background-color: white;
      border-color: white;
      transform: translateY(-2px);
      box-shadow: 0 12px 20px -6px rgba(0, 0, 0, 0.25);
    }

    .btn-web:active {
      transform: translateY(1px);
    }

    .social-grid {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .social-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: #ffffff;
      border-radius: 60px;
      width: 58px;
      height: 58px;
      transition: all 0.25s ease;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .social-icon svg {
      width: 28px;
      height: 28px;
      fill: #db0000;
      transition: all 0.25s ease;
    }

    .social-icon:hover {
      background-color: #db0000;
      border-color: #db0000;
      transform: translateY(-4px);
      box-shadow: 0 12px 22px rgba(0, 0, 0, 0.2);
    }

    .social-icon:hover svg {
      fill: #ffffff;
    }

    .social-icon:active {
      transform: translateY(2px);
      transition: 0.05s;
    }

    /* Logo Google Play */
    .googleplay-logo {
      text-align: center;
      margin-top: 32px;
      margin-bottom: 16px;
    }

    .googleplay-img {
      max-width: 140px;
      width: 100%;
      height: auto;
      display: inline-block;
      transition: transform 0.2s ease;
      cursor: pointer;
    }

    .googleplay-img:hover {
      transform: scale(1.02);
    }

    .footer-note {
      text-align: center;
      margin-top: 20px;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.8);
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      padding-top: 20px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    @media (max-width: 480px) {
      body {
        padding: 20px 16px;
      }
      .linktree-container {
        padding: 8px 0 32px 0;
      }
      .btn-link {
        padding: 10px 14px;
        font-size: 0.9rem;
        gap: 8px;
      }
      .social-icon {
        width: 52px;
        height: 52px;
      }
      .social-icon svg {
        width: 25px;
        height: 25px;
      }
      .logo-png {
        max-width: 170px;
      }
      .googleplay-img {
        max-width: 120px;
      }
    }

    @media (max-width: 380px) {
      .social-grid {
        gap: 18px;
      }
      .social-icon {
        width: 48px;
        height: 48px;
      }
      .social-icon svg {
        width: 23px;
        height: 23px;
      }
      .btn-link {
        padding: 9px 12px;
        font-size: 0.85rem;
      }
      .logo-png {
        max-width: 140px;
      }
      .googleplay-img {
        max-width: 105px;
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .linktree-container {
      animation: fadeUp 0.45s ease-out;
    }

    img {
      border: none;
      outline: none;
    }
  </style>
</head>
<body>
  <div class="linktree-container">
    <div class="header">
      <div class="logo-wrapper">
        <img src="images/la_carta_intro.png" alt="La Carta App" class="logo-png" id="mainLogo">

      <!-- Botón 2: Sitio Web de la carta - SIN ICONOS -->
      <a href="index.html" class="btn-link btn-web" id="webCartaBtn" target="_blank" rel="noopener noreferrer">

.22468C20.2247 6.05433 20.2142 5.76559 20.1754 4.8729C20.1366 3.98096 20.002 3.37807 19.8016 2.85054C19.5939 2.30377 19.3124 1.8394 18.8488 1.37586C18.3853 0.912313 17.9209 0.630814 17.3741 0.423057C16.8466 0.222681 16.2437 0.0880575 15.3518 0.0492524C14.4591 0.0104473 14.1703 0 12 0Z" />

          <circle cx="17.104" cy="6.896" r="1.5" />
        </svg>
      </a>

      <!-- Facebook -->
      <a href="#" class="social-icon" id="facebookBtn" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22 12.0611C22 6.50451 17.5228 2 12 2C6.47715 2 2 6.50451 2 12.0611C2 17.0828 5.65684 21.2452 10.4375 22V14.9694H7.89844V12.0611H10.4375V9.84452C10.4375 7.32296 11.9305 5.93012 14.2146 5.93012C15.3088 5.93012 16.4531 6.12663 16.4531 6.12663V8.60261H15.1922C13.9499 8.60261 13.5625 9.37822 13.5625 10.1739V12.0611H16.3359L15.8926 14.9694H13.5625V22C18.3432 21.2452 22 17.0828 22 12.0611Z" />
        </svg>
      </a>

      <!-- TikTok -->
      <a href="#" class="social-icon" id="tiktokBtn" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M19.589 6.686a5.023 5.023 0 0 1-2.956-1.01 4.982 4.982 0 0 1-1.92-2.262A5.012 5.012 0 0 1 14.452 0h-3.114v16.108a3.073 3.073 0 0 1-1.521 2.645 3.034 3.034 0 0 1-3.02.116 3.074 3.074 0 0 1-1.589-2.71 3.078 3.078 0 0 1 1.598-2.691 3.042 3.042 0 0 1 3.008-.118v-3.29a6.334 6.334 0 0 0-3.493-.018 6.264 6.264 0 0 0-3.777 3.303 6.354 6.354 0 0 0 2.42 7.846 6.273 6.273 0 0 0 3.826.723 6.296 6.296 0 0 0 3.456-1.722 6.324 6.324 0 0 0 1.963-3.37c.176-.893.21-1.802.098-2.704V7.817a7.928 7.928 0 0 0 4.688 1.538v-3.29a5.02 5.02 0 0 1-2.81-1.379z" />
        </svg>
      </a>
    </div>

    <!-- Logo PNG de Google Play debajo de los botones de redes sociales -->
    <div class="googleplay-logo">
      <a href="#" id="googlePlayLogoLink" target="_blank" rel="noopener noreferrer">
        <img src="images/googleplay.png" alt="Descargar en Google Play" class="googleplay-img" id="googlePlayLogo">
      </a>
    </div>

    <div class="footer-note">
      Síguenos en redes · Descarga la app oficial
    </div>
  </div>

  <script>
    (function() {
      // ==============================================================
      // 🔴 IMPORTANTE: REEMPLAZA ESTAS URLS CON LAS TUYAS REALES 🔴
      // ==============================================================
      
      // URL de descarga en Google Play (cambia por la URL real de tu app)
      const GOOGLE_PLAY_URL = "proximamente.html";
      
      // URL de tu sitio web de la carta (cambia por la URL real)
      const CARTA_WEB_URL = "index.html";
      
      // URLs de redes sociales (cambia por las reales)
      const FACEBOOK_URL = "https://www.facebook.com/tucuenta";
      const TIKTOK_URL = "https://www.tiktok.com/@tucuenta";
      
      // NOTA: Instagram ya está configurado correctamente con:
      // https://www.instagram.com/la_carta_app/?hl=es
      // ==============================================================
      
      // Asignar URLs a los botones
      const googleBtn = document.getElementById('googlePlayBtn');
      const webCartaBtn = document.getElementById('webCartaBtn');
      const fbBtn = document.getElementById('facebookBtn');
      const ttBtn = document.getElementById('tiktokBtn');
      const googlePlayLogoLink = document.getElementById('googlePlayLogoLink');
      
      // Asignar enlaces si existen
      if (googleBtn && GOOGLE_PLAY_URL && GOOGLE_PLAY_URL !== "#") {
        googleBtn.href = GOOGLE_PLAY_URL;
        googleBtn.setAttribute('target', '_blank');
        googleBtn.setAttribute('rel', 'noopener noreferrer');
      }
      
      if (webCartaBtn && CARTA_WEB_URL && CARTA_WEB_URL !== "#") {
        webCartaBtn.href = CARTA_WEB_URL;
        webCartaBtn.setAttribute('target', '_blank');
        webCartaBtn.setAttribute('rel', 'noopener noreferrer');
      }
      
      if (fbBtn && FACEBOOK_URL && FACEBOOK_URL !== "#") {
        fbBtn.href = FACEBOOK_URL;
        fbBtn.setAttribute('target', '_blank');
        fbBtn.setAttribute('rel', 'noopener noreferrer');
      }
      
      if (ttBtn && TIKTOK_URL && TIKTOK_URL !== "#") {
        ttBtn.href = TIKTOK_URL;
        ttBtn.setAttribute('target', '_blank');
        ttBtn.setAttribute('rel', 'noopener noreferrer');
      }
      
      // Asignar el mismo enlace de Google Play al logo
      if (googlePlayLogoLink && GOOGLE_PLAY_URL && GOOGLE_PLAY_URL !== "#") {
        googlePlayLogoLink.href = GOOGLE_PLAY_URL;
        googlePlayLogoLink.setAttribute('target', '_blank');
        googlePlayLogoLink.setAttribute('rel', 'noopener noreferrer');
      }
      
      // Manejo de error del logo principal
      const logoImg = document.getElementById('mainLogo');
      if (logoImg) {
        logoImg.addEventListener('error', function() {
          const wrapper = document.querySelector('.logo-wrapper');
          if (wrapper && !wrapper.querySelector('.fallback-logo')) {
            const fallbackSpan = document.createElement('div');
            fallbackSpan.className = 'fallback-logo';
            fallbackSpan.style.backgroundColor = 'rgba(255,255,255,0.2)';
            fallbackSpan.style.width = '180px';
            fallbackSpan.style.height = '180px';
            fallbackSpan.style.borderRadius = '36px';
            fallbackSpan.style.display = 'flex';
            fallbackSpan.style.alignItems = 'center';
            fallbackSpan.style.justifyContent = 'center';
            fallbackSpan.style.fontSize = '4rem';
            fallbackSpan.style.fontWeight = 'bold';
            fallbackSpan.style.color = 'white';
            fallbackSpan.innerText = '📄';
            fallbackSpan.style.backdropFilter = 'blur(4px)';
            logoImg.style.display = 'none';
            wrapper.appendChild(fallbackSpan);
          }
        });
      }
      
      // Manejo de error del logo de Google Play
      const googlePlayLogoImg = document.getElementById('googlePlayLogo');
      if (googlePlayLogoImg) {
        googlePlayLogoImg.addEventListener('error', function() {
          // Si no se encuentra la imagen, mostrar un texto alternativo
          this.style.display = 'none';
          const parent = this.parentElement;
          if (parent && !parent.querySelector('.fallback-googleplay')) {
            const fallbackText = document.createElement('span');
            fallbackText.className = 'fallback-googleplay';
            fallbackText.style.backgroundColor = 'white';
            fallbackText.style.color = '#db0000';
            fallbackText.style.padding = '10px 20px';
            fallbackText.style.borderRadius = '50px';
            fallbackText.style.fontWeight = 'bold';
            fallbackText.style.fontSize = '0.85rem';
            fallbackText.style.display = 'inline-block';
            fallbackText.innerText = 'Descargar en Google Play';
            parent.appendChild(fallbackText);
          }
        });
      }
      
      console.log("✅ Enlaces actualizados correctamente - Iconos eliminados de botones");
    })();
  </script>
</body>
</html>
